<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Czy my</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="logo-180.png">
    <link rel="manifest" href="manifest.webmanifest">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Czy my">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#edcbb1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="screen-texture" class="texture-layer"></div>

<div id="splash-fullscreen" aria-hidden="true">
    <div id="splash-bg"></div>
    <svg class="splash-wave" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <path d="M-2 62 C 15 54, 36 70, 58 62 C 74 56, 88 61, 102 58"></path>
        <path d="M-2 67 C 18 59, 42 75, 64 67 C 80 60, 92 65, 102 63"></path>
    </svg>
    <div class="splash-content">
        <h1><span class="splash-czy">Czy</span> <span class="splash-my">my</span></h1>
        <p class="splash-subtitle">...chcemy mieć razem dziecko?</p>
    </div>
</div>

<div id="app-container" class="theme-brown splash-mode">
    <div class="corner-frame" aria-hidden="true">
        <span class="corner-accent corner-top-left"></span>
        <span class="corner-accent corner-top-right"></span>
        <span class="corner-accent corner-bottom-left"></span>
        <span class="corner-accent corner-bottom-right"></span>
    </div>

    <div id="screen-splash" class="screen"></div>

    <div id="screen-language" class="screen screen-centered">
        <h2>Wybierz Język<br>Choose Language</h2>
        <button onclick="setLanguage('pl')">PL</button>
        <button id="btn-language-en" onclick="setLanguage('en')" disabled aria-disabled="true">ENG</button>
    </div>

    <div id="screen-login" class="screen screen-centered">
        <h2 id="txt-login-header">Zaloguj się,<br> aby rozpocząć</h2>
        <label for="email">E-mail</label>
        <input type="email" id="email-input" placeholder="E-mail" autocomplete="email">
        <label for="email">Hasło</label>
        <input type="password" id="password-input" placeholder="****">
        <button id="btn-login" onclick="checkPassword()">Start</button>
        <div id="error-msg" style="color:var(--rosewood); display:none; margin-top:0px;">Błędne hasło!</div>
    </div>

  <div id="screen-mode" class="screen screen-centered">
        <h2 id="txt-mode-header">Wybierz tryb</h2>
        <button id="btn-mode-random" onclick="selectMode('random')">Losowo</button>
        <button id="btn-mode-sequential" onclick="selectMode('sequential')">Po kolei</button>
        <button class="back-btn" onclick="showScreen('screen-categories'); resetThemeToDefault();" id="btn-mode-back-cat">Zmień kategorię</button>
    </div>

  <div id="screen-categories" class="screen">
        <h2 id="txt-cat-header">Wybierz Kategorię</h2>
        <div class="content-area">
            <div id="categories-list"></div>
        </div>
        <div class="footer-area">
            <button id="btn-change-lang" class="back-btn" onclick="showScreen('screen-language')">Zmień język</button>
        </div>
    </div>

<div id="screen-game" class="screen">
        <div class="content-area">
            <p id="question-text">Pytanie...</p>
        </div>
        <div class="footer-area">
            <button id="btn-next" onclick="handleNext()">Następne</button>
            <button id="btn-change-cat" class="back-btn" onclick="showScreen('screen-categories'); resetThemeToDefault();">Zmień kategorię</button>
        </div>
    </div>

    <div id="screen-finished" class="screen screen-centered">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h2 style="font-size: 3rem; margin-bottom: 20px;">✓</h2>
            <p id="txt-finish-header">To już wszystkie pytania w tej kategorii!</p>
        </div>
        <button id="btn-back-menu" onclick="resetApp()">Wróć do menu</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
